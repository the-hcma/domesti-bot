<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>domesti-bot</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: light dark;
      --fg: #1d1f21;
      --muted: #5a6171;
      --accent: #2e7d32;
      --pending: #b58900;
      --danger: #b3261e;
      --card: #ffffff;
      --card-elev: #fafbfc;
      --bg: #f6f7f9;
      --border: #e1e4e8;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #e6e6e6;
        --muted: #a0a6b1;
        --accent: #7bd389;
        --pending: #f4c54e;
        --danger: #ff7b72;
        --card: #1f2226;
        --card-elev: #262a30;
        --bg: #15171a;
        --border: #2a2e34;
      }
    }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    main { max-width: 960px; margin: 4vh auto; padding: 24px; }
    h1, h2, h3, h4 { margin: 0; }
    h3 { font-size: 15px; }
    p { margin: 8px 0; color: var(--muted); }

    /* Devices panel — populated by /static/dist/main.js */
    #app { display: flex; flex-direction: column; gap: 18px; }
    .tile-header { display: flex; align-items: center; justify-content: flex-end;
      gap: 12px; padding: 0 4px; }
    .tile-loading, .tile-empty { color: var(--muted); padding: 12px; }
    .tile-error { background: var(--danger); color: white; padding: 10px 14px;
      border-radius: 6px; margin-bottom: 12px; }
    .family { background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px; }
    .family-header { display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
      margin-bottom: 12px; }
    .family-header h3::before {
      content: ""; display: inline-block; width: 10px; height: 10px;
      background: var(--family-color, var(--muted)); border-radius: 3px;
      margin-right: 8px; vertical-align: middle;
    }
    .tile-grid { display: grid; gap: 10px;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
    .tile { background: var(--card-elev); border: 1px solid var(--border);
      border-left: 3px solid var(--family-color, var(--muted));
      border-radius: 8px; padding: 10px 12px;
      display: flex; flex-direction: column; gap: 8px; }
    .tile-head { display: flex; align-items: center; justify-content: space-between;
      gap: 6px; }
    .tile-label { font-size: 14px; font-weight: 600; }
    .tile-state { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--muted); }
    .tile-state-on { color: var(--accent); }
    .tile-state-off { color: var(--muted); }
    .tile-state-open { color: var(--pending); }
    .tile-state-closed { color: var(--accent); }
    .tile-state-unknown { color: var(--pending); }
    .tile-toggle { font: inherit; cursor: pointer;
      border: 1px solid var(--border); background: var(--card);
      color: var(--fg); border-radius: 6px; padding: 6px 10px; min-width: 64px; }
    .tile-toggle[data-on="true"] { background: var(--family-color, var(--accent));
      color: white; border-color: transparent; }
    .tile-toggle:focus-visible { outline: 2px solid var(--family-color, var(--accent));
      outline-offset: 2px; }
    .tile-note { font-size: 12px; color: var(--muted); margin: 0; }
    .tile-exclude { display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted); cursor: pointer; }
    .btn { font: inherit; cursor: pointer; border: 1px solid var(--border);
      background: var(--card); color: var(--fg); border-radius: 6px; padding: 6px 12px; }
    .btn-danger { background: var(--danger); color: white; border-color: transparent; }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  </style>
</head>
<body>
  <main>
    <div id="app"></div>
  </main>
  <script type="module" src="/static/dist/main.js"></script>
</body>
</html>
