# Release Please opens release PRs from Conventional Commits on main; merging
# creates a tag and runs the PyPI publish job. See docs/RELEASING.md.

name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - uses: actions/checkout@v6

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          release-type: python

      - name: Assert release-please acted on releasable commits
        if: github.event_name == 'push'
        shell: bash
        env:
          RELEASE_CREATED: ${{ steps.release.outputs.release_created }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          commit_title=$(git log -1 --format='%s' "$COMMIT_SHA")
          if echo "$commit_title" | grep -qE '^(feat|fix)(\([^)]*\))?!?:' && \
             [[ "$RELEASE_CREATED" != "true" ]] && \
             [[ -z "$RELEASE_PR" ]]; then
            echo "ERROR: Commit '$commit_title' looks releasable but release-please neither created a release nor opened/updated a release PR." >&2
            echo "This usually means the commit message could not be parsed. Check that squash_merge_commit_message=BLANK is set on the repository." >&2
            exit 1
          fi

      # GITHUB_TOKEN updates do not fire pull_request; CI listens on pull_request_target
      # for github-actions[bot]. An empty commit ensures synchronize after force-push.
      - name: Request CI on release PR
        if: >-
          steps.release.outputs.pr != '' &&
          steps.release.outputs.release_created != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          set -euo pipefail
          pr_number=$(jq -r '.number' <<<"$RELEASE_PR_JSON")
          head_branch=$(gh pr view "$pr_number" --repo "$GITHUB_REPOSITORY" --json headRefName -q .headRefName)
          git fetch origin "$head_branch"
          git checkout "$head_branch"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: request CI checks on release PR"
          git push origin "HEAD:${head_branch}"

  publish-pypi:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7

      - name: Install Python dependencies (dev)
        run: uv sync --group dev

      - name: Pyright
        run: uv run pyright

      - name: Pytest (hermetic)
        run: uv run pytest -m "not integration and not browser" -n auto

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enable pnpm via corepack
        run: corepack enable pnpm

      - name: Build web bundle
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Embed build metadata
        run: |
          embedded_version="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          export DOMESTI_EMBED_VERSION="${embedded_version}"
          export DOMESTI_EMBED_COMMIT="${GITHUB_SHA}"
          uv run python scripts/embed_build_metadata.py

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
