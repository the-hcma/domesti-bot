name: CI

on:
  # Omitting push: main — once a merge queue is enabled it validates the
  # integrated state itself; a second CI run after merge duplicates work
  # without adding signal. Until then, PR validation is sufficient.
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches-ignore:
      - '**/graphite-base/**'
  schedule:
    # Weekly full suite — catches new CVEs and regressions between PRs.
    - cron: '0 7 * * 4'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: Guard
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.set-skip.outputs.skip }}
    steps:
      # Fetch PR state with automatic retries so transient GitHub API errors
      # (e.g. 504) don't fail the Guard job and block the merge queue.
      - id: pr-state
        uses: nick-fields/retry@v4
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        with:
          timeout_seconds: 15
          max_attempts: 3
          retry_wait_seconds: 5
          command: |
            if [[ -z "$PR_NUMBER" ]]; then exit 0; fi
            state=$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json state -q .state)
            echo "state=$state" >> "$GITHUB_OUTPUT"

      - id: set-skip
        env:
          HEAD_REF: ${{ github.head_ref || github.ref_name }}
          PR_STATE: ${{ steps.pr-state.outputs.state }}
        run: |
          # Skip merge-queue staging branches — the merge queue validates the
          # integrated state itself; CI there duplicates work.
          # Skip when the PR is already merged — Graphite pushes a restack
          # commit to the next branch after a merge lands, which would
          # otherwise trigger a redundant CI run on an already-validated diff.
          if [[ "$HEAD_REF" == gtmq_merge_* ]] || [[ "$PR_STATE" == "MERGED" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  ci:
    name: CI
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    permissions:
      contents: read
      checks: write
    uses: ./.github/workflows/ci-reusable.yml
    with:
      ref: ${{ github.event.pull_request.head.sha || github.sha }}
      gitleaks_base: ${{ github.event.pull_request.base.sha || '' }}
