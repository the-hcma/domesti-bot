# Release-please CI — same scripts as ci.yml, published via checks-action on inputs.ref.
# GITHUB_TOKEN pushes never fire pull_request; branch protection needs named checks
# on the release PR head commit (not "CI / …" prefixed reusable-workflow job names).
name: CI (release PR)

on:
  workflow_call:
    inputs:
      ref:
        description: Commit SHA to check out and attach check runs to
        required: true
        type: string
      gitleaks_base:
        description: Base SHA for gitleaks diff scan (empty = full repo scan)
        required: false
        type: string
        default: ""

permissions:
  contents: read
  checks: write

jobs:
  pyright:
    name: Pyright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: latest

      - id: run
        name: Pyright
        run: bash .github/ci/pyright

      - uses: LouisBrunner/checks-action@v3.1.0
        if: always()
        with:
          token: ${{ github.token }}
          sha: ${{ inputs.ref }}
          name: Pyright
          conclusion: ${{ steps.run.outcome == 'success' && 'success' || 'failure' }}

  test:
    name: Pytest (hermetic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: latest

      - id: run
        name: Pytest (hermetic)
        run: bash .github/ci/pytest-hermetic

      - uses: LouisBrunner/checks-action@v3.1.0
        if: always()
        with:
          token: ${{ github.token }}
          sha: ${{ inputs.ref }}
          name: Pytest (hermetic)
          conclusion: ${{ steps.run.outcome == 'success' && 'success' || 'failure' }}

  test-browser:
    name: Pytest (browser layout)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: latest

      - id: run
        name: Pytest (browser layout)
        run: bash .github/ci/pytest-browser

      - uses: LouisBrunner/checks-action@v3.1.0
        if: always()
        with:
          token: ${{ github.token }}
          sha: ${{ inputs.ref }}
          name: Pytest (browser layout)
          conclusion: ${{ steps.run.outcome == 'success' && 'success' || 'failure' }}

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - id: run
        name: Shellcheck
        run: bash .github/ci/shellcheck

      - uses: LouisBrunner/checks-action@v3.1.0
        if: always()
        with:
          token: ${{ github.token }}
          sha: ${{ inputs.ref }}
          name: Shellcheck
          conclusion: ${{ steps.run.outcome == 'success' && 'success' || 'failure' }}

  web-build:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - id: run
        name: Web (typecheck + build)
        run: bash .github/ci/web-build

      - uses: LouisBrunner/checks-action@v3.1.0
        if: always()
        with:
          token: ${{ github.token }}
          sha: ${{ inputs.ref }}
          name: Web (typecheck + build)
          conclusion: ${{ steps.run.outcome == 'success' && 'success' || 'failure' }}

  workflow-lint:
    name: Workflow Lint (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Install actionlint
        run: |
          curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash
          sudo mv actionlint /usr/local/bin/

      - id: run
        name: Workflow Lint (actionlint)
        run: bash .github/ci/workflow-lint

      - uses: LouisBrunner/checks-action@v3.1.0
        if: always()
        with:
          token: ${{ github.token }}
          sha: ${{ inputs.ref }}
          name: Workflow Lint (actionlint)
          conclusion: ${{ steps.run.outcome == 'success' && 'success' || 'failure' }}

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - id: run
        name: Secret Scan
        env:
          GITLEAKS_BASE: ${{ inputs.gitleaks_base }}
          GITLEAKS_HEAD: ${{ inputs.ref }}
        run: bash .github/ci/secret-scan

      - uses: LouisBrunner/checks-action@v3.1.0
        if: always()
        with:
          token: ${{ github.token }}
          sha: ${{ inputs.ref }}
          name: Secret Scan
          conclusion: ${{ steps.run.outcome == 'success' && 'success' || 'failure' }}
