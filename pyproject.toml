[project]
name = "domesti-bot"
version = "0.1.0"
description = "Self-hosted LAN control surface for TP-Link Kasa, Sonos, and GoTailwind devices, with a tile-based web UI."
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
authors = [
    { name = "Henrique Andrade", email = "thehcma@users.noreply.github.com" },
]
requires-python = ">=3.11"
dependencies = [
    "click==8.4.0",
    "cryptography>=48.0.0",
    "fastapi>=0.136.1",
    "gotailwind[cli]",
    "httpx>=0.28.1",
    "idna==3.15",
    "prompt_toolkit>=3.0.43",
    "pychromecast>=14.0.10",
    "pyproj",
    "python-kasa",
    "requests>=2.34.2",
    "soco>=0.31.0",
    "sqlalchemy>=2.0.49",
    "uvicorn[standard]>=0.47.0",
    "zeroconf>=0.149.3",
]

[tool.uv]
package = false

[tool.pytest.ini_options]
testpaths = ["tests/python"]
python_files = ["test_*.py"]
pythonpath = ["."]
asyncio_mode = "auto"
markers = [
    "browser: layout checks that need headless Chromium (install dev group + playwright)",
    "integration: exercises real LAN hardware; requires env-specific credentials",
]

[dependency-groups]
dev = [
    "icecream>=2.2.0",
    "playwright>=1.59.0",
    "pyright>=1.1.409",
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "pytest-xdist>=3.8.0",
]
