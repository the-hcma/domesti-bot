[project]
name = "domesti-bot"
version = "0.1.0"
description = "Self-hosted LAN control surface for TP-Link Kasa, Sonos, and GoTailwind devices, with a tile-based web UI."
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
authors = [
    { name = "Henrique Andrade", email = "thehcma@users.noreply.github.com" },
]
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.136.1",
    "gotailwind[cli]",
    "httpx>=0.28.1",
    "icecream",
    "prompt_toolkit>=3.0.43",
    "pychromecast>=14.0.10",
    "pyproj",
    "pyright",
    "pytest",
    "pytest-asyncio",
    "pytest-xdist>=3.8.0",
    "python-kasa",
    "soco>=0.30",
    "uvicorn[standard]>=0.46.0",
    "zeroconf>=0.148.0",
]

[tool.uv]
package = false

[tool.pytest.ini_options]
testpaths = ["tests/python"]
python_files = ["test_*.py"]
pythonpath = ["."]
asyncio_mode = "auto"
markers = [
    "integration: exercises real LAN hardware; requires env-specific credentials",
]
