[project]
name = "domesti-bot"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.136.1",
    "gotailwind[cli]",
    "httpx>=0.28.1",
    "icecream",
    "prompt_toolkit>=3.0.43",
    "pychromecast>=14.0.10",
    "pyproj",
    "pyright",
    "pytest",
    "pytest-asyncio",
    "python-kasa",
    "soco>=0.30",
    "uvicorn[standard]>=0.46.0",
    "zeroconf>=0.148.0",
]

[tool.uv]
package = false

[tool.pytest.ini_options]
testpaths = ["tests/python"]
python_files = ["test_*.py"]
pythonpath = ["."]
asyncio_mode = "auto"
markers = [
    "integration: exercises real LAN hardware; requires env-specific credentials",
]
